configuration:
  external_ip:
    name: External IP or Domain
    description: Your public IP address or domain name (e.g. nc.yourdomain.com)
  static_auth_secret:
    name: Auth Secret
    description: A long random string used to authenticate TURN clients. Generate with openssl rand -hex 32.
  realm:
    name: Realm
    description: Your domain name (e.g. yourdomain.com)
  listening_port:
    name: TURN Port (UDP/TCP)
    description: Port for unencrypted TURN/STUN (default 3478)
  tls_port:
    name: TURN TLS Port
    description: Port for encrypted TURN/STUN (default 5349)
  use_tls:
    name: Enable TLS
    description: Use TLS encryption for TURN connections (recommended)
  cert_path:
    name: Certificate Path
    description: Path to your SSL certificate (default /ssl/fullchain.pem)
  key_path:
    name: Key Path
    description: Path to your SSL private key (default /ssl/privkey.pem)
  min_port:
    name: Relay Min Port
    description: Lower bound of the UDP relay port range. Must be forwarded in your router.
  max_port:
    name: Relay Max Port
    description: Upper bound of the UDP relay port range. Must be forwarded in your router.
