name: Coturn TURN Server
description: TURN/STUN server for Nextcloud Talk and other WebRTC applications
version: "1.2.2"
slug: coturn
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: false
auth_api: false
hassio_api: false
host_network: true
privileged:
  - NET_ADMIN
options:
  external_ip: ""
  static_auth_secret: ""
  realm: ""
  listening_port: 3478
  tls_port: 5349
  use_tls: true
  cert_path: "/ssl/fullchain.pem"
  key_path: "/ssl/privkey.pem"
  min_port: 49160
  max_port: 49200
schema:
  external_ip: str
  static_auth_secret: password
  realm: str
  listening_port: int
  tls_port: int
  use_tls: bool
  cert_path: str
  key_path: str
  min_port: int
  max_port: int
map:
  - ssl:ro
